{% extends "base.html" %}
{% block title %}Registrar Ingreso — JWLR Petrol{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white fw-semibold">
        <i class="bi bi-fuel-pump-fill"></i> Registrar Ingreso de Carburante
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Tanque de Destino</label>
            <select name="id_tanque" class="form-select" required>
              <option value="">-- Seleccione tanque --</option>
              {% for t in tanques %}
              <option value="{{ t.id }}">
                {{ t.identificador }} — {{ t.tipo_carburante }}
                (Stock actual: {{ t.stock_actual | round(1) }} L /
                 Cap. máx: {{ t.capacidad_maxima | round(0) | int }} L)
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Litros Ingresados</label>
            <div class="input-group">
              <input type="number" name="litros" class="form-control"
                     placeholder="0.00" min="0.1" step="0.1" required>
              <span class="input-group-text">L</span>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">N° Factura / Remisión</label>
            <input type="text" name="nro_factura_remision" class="form-control"
                   placeholder="FACT-2024-XXX" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Fecha y Hora</label>
            <input type="datetime-local" name="fecha_hora" class="form-control"
                   value="{{ ahora }}">
            <div class="form-text">Por defecto usa la fecha y hora actual.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> Registrar Ingreso
            </button>
            <a href="{{ url_for('ingresos.lista') }}" class="btn btn-outline-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
